<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Habit Ledger</title>

<style>
body{font-family:sans-serif;background:#020617;color:white;padding:20px}
.container{max-width:800px;margin:auto}
.card{background:#0f172a;padding:12px;border-radius:10px;margin-bottom:12px}
button,input,select{margin:4px;padding:6px 10px;border:none;border-radius:6px}
button{cursor:pointer}
.primary{background:#2563eb;color:white}
.done{background:#16a34a;color:white}
.fail{background:#dc2626;color:white}
.danger{background:#b91c1c;color:white}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.day{padding:8px;text-align:center;background:#1e293b;border-radius:6px;cursor:pointer}
.green{background:#16a34a}
.red{background:#dc2626}
.hidden{display:none}
.glass{background:rgba(255,255,255,0.05);padding:10px;border-radius:10px;margin-bottom:10px}
</style>

</head>

<body>

<div class="container">
<h2>📊 Habit Ledger</h2>

<button class="primary" onclick="toggleAdd()">+ Add Habit</button>

<div id="addBox" class="glass hidden">
<input id="name" placeholder="Habit name">
<select id="type">
<option value="good">Constructive</option>
<option value="bad">Destructive</option>
</select>
<button onclick="addHabit()">Save</button>
</div>

<div class="glass">
<select id="filter" onchange="render()">
<option value="7">Last 7 days</option>
<option value="30">Last 30 days</option>
<option value="90">Last 3 months</option>
<option value="180">Last 6 months</option>
<option value="365">Last year</option>
</select>
</div>

<div id="list"></div>

</div>

<script>
let habits = JSON.parse(localStorage.getItem("habits")) || [];
let current = new Date();

function save(){
  localStorage.setItem("habits",JSON.stringify(habits));
  render();
}

function toggleAdd(){
  document.getElementById("addBox").classList.toggle("hidden");
}

function addHabit(){
  const name=document.getElementById("name").value;
  const type=document.getElementById("type").value;
  if(!name) return;

  habits.push({name,type,history:[],showCal:false});
  document.getElementById("name").value="";
  toggleAdd();
  save();
}

function markToday(i,done){
  const today=new Date().toDateString();
  habits[i].history = habits[i].history.filter(h=>h.date!==today);
  habits[i].history.push({date:today,done});
  save();
}

// ✅ Correct streak logic (continuous days only)
function streak(h){
  let s=0;
  let entries=[...h.history].map(e=>({...e,d:new Date(e.date)})).sort((a,b)=>b.d-a.d);

  let currentDate=new Date();
  currentDate.setHours(0,0,0,0);

  for(let e of entries){
    let d=new Date(e.d);
    d.setHours(0,0,0,0);

    if(d.getTime()!==currentDate.getTime()) break;

    if(h.type==="good" && e.done) s++;
    else if(h.type==="bad" && !e.done) s++;
    else break;

    currentDate.setDate(currentDate.getDate()-1);
  }
  return s;
}

// ✅ Filter count
function totalFiltered(h){
  let days=parseInt(document.getElementById("filter").value);
  let now=new Date();
  let start=new Date();
  start.setDate(now.getDate()-days);

  return h.history.filter(e=>{
    let d=new Date(e.date);
    if(d<start) return false;
    return h.type==="good" ? e.done : !e.done;
  }).length;
}

function toggleCalendar(i){
  habits[i].showCal=!habits[i].showCal;
  save();
}

function toggleDay(i,date){
  let h=habits[i];
  let e=h.history.find(x=>x.date===date);

  if(e){ e.done=!e.done; }
  else{ h.history.push({date,done:true}); }

  save();
}

function getStatus(h,date){
  let e=h.history.find(x=>x.date===date);
  if(!e) return "";

  return h.type==="good"
    ? (e.done?"green":"red")
    : (e.done?"red":"green");
}

function changeMonth(offset){
  current.setMonth(current.getMonth()+offset);
  render();
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  habits.forEach((h,i)=>{
    let div=document.createElement("div");
    div.className="card";

    let calendar="";
    if(h.showCal){
      let y=current.getFullYear();
      let m=current.getMonth();
      let days=new Date(y,m+1,0).getDate();

      calendar=`
      <div>
        <button onclick="changeMonth(-1)">◀</button>
        ${current.toLocaleString('default',{month:'long',year:'numeric'})}
        <button onclick="changeMonth(1)">▶</button>
      </div>`;

      calendar+='<div class="calendar">';
      for(let d=1;d<=days;d++){
        let date=new Date(y,m,d).toDateString();
        let cls=getStatus(h,date);

        calendar+=`
        <div class="day ${cls}" onclick="toggleDay(${i},'${date}')">
          ${d}
        </div>`;
      }
      calendar+='</div>';
    }

    div.innerHTML=`
    <b>${h.name}</b><br>
    🔥 Streak: ${streak(h)} | 📊 Filter Count: ${totalFiltered(h)}<br>

    <button class="done" onclick="markToday(${i},true)">Done Today</button>
    <button class="fail" onclick="markToday(${i},false)">Not Done</button>

    <button onclick="toggleCalendar(${i})">📅 Calendar</button>
    <button onclick="editHabit(${i})">Edit</button>
    <button onclick="deleteHabit(${i})" class="danger">Delete</button>
    <button onclick="clearHabitData(${i})" class="danger">Clear Data</button>

    ${calendar}
    `;

    list.appendChild(div);
  });
}

function editHabit(i){
  let n=prompt("Edit name",habits[i].name);
  if(n){ habits[i].name=n; save(); }
}

function deleteHabit(i){
  if(confirm("Delete habit?")){
    habits.splice(i,1);
    save();
  }
}

function clearHabitData(i){
  if(confirm("Clear all data for this habit?")){
    habits[i].history=[];
    save();
  }
}

render();
</script>

</body>
</html>
