<!DOCTYPE html>
<html>
<head>
  <title>Habit Ledger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; font-family:'Segoe UI',sans-serif; background:linear-gradient(135deg,#020617,#0f172a); color:white; padding:20px; }
    .container { max-width:500px; margin:auto; }
    h1 { text-align:center; margin-bottom:5px; }
    .subtitle { text-align:center; opacity:0.6; margin-bottom:20px; }
    .glass { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); padding:12px; border-radius:12px; margin-bottom:15px; }
    input,select,button { padding:10px; border-radius:8px; border:none; margin:5px; }
    button { cursor:pointer; }
    .primary { background:#2563eb; color:white; }
    .done { background:#16a34a; color:white; }
    .fail { background:#dc2626; color:white; }
    .secondary { background:#475569; color:white; }
    .danger { background:#b91c1c; color:white; }
    .card { background:rgba(255,255,255,0.06); border-radius:14px; padding:15px; margin-bottom:12px; }
    .hidden { display:none; }
    .history span { margin-right:4px; font-size:18px; }
  </style>
</head>
<body>
<div class="container">
  <h1>📊 Habit Ledger</h1>
  <div class="subtitle">Discipline • Consistency • Growth</div>

  <button class="primary" onclick="toggleAdd()">+ Add Habit</button>

  <div id="addBox" class="glass hidden">
    <input id="name" placeholder="Habit name">
    <select id="type">
      <option value="good">Constructive</option>
      <option value="bad">Destructive</option>
    </select>
    <button class="primary" onclick="addHabit()">Save</button>
  </div>

  <div class="glass">
    <button class="secondary" onclick="exportData()">⬇ Export</button>
    <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    <button class="secondary" onclick="document.getElementById('importFile').click()">⬆ Import</button>
    <button class="danger" onclick="clearData()">🗑 Clear</button>
  </div>

  <div class="glass">
    <select id="range" onchange="render()">
      <option value="7">Last 7 days</option>
      <option value="thisMonth">This Month</option>
      <option value="lastMonth">Last Month</option>
      <option value="3">Last 3 Months</option>
      <option value="6">Last 6 Months</option>
      <option value="thisYear">This Year</option>
      <option value="lastYear">Last Year</option>
    </select>
    <input type="date" id="date" onchange="render()">
  </div>

  <div id="list"></div>
</div>

<script>
let habits = JSON.parse(localStorage.getItem("habits")) || [];
const today = new Date();
const dateInput = document.getElementById("date");
dateInput.valueAsDate = today;
dateInput.max = today.toISOString().split("T")[0];

function toggleAdd(){ document.getElementById("addBox").classList.toggle("hidden"); }

function save(){ localStorage.setItem("habits", JSON.stringify(habits)); render(); }

function addHabit(){
  const name = document.getElementById("name").value;
  const type = document.getElementById("type").value;
  if(!name) return;
  habits.push({ name, type, history: [] });
  document.getElementById("name").value="";
  toggleAdd();
  save();
}

function mark(i, done){
  const date = new Date(dateInput.value).toDateString();
  habits[i].history = habits[i].history.filter(h=>h.date!==date);
  habits[i].history.push({date, done});
  save();
}

function exportData(){
  const blob = new Blob([JSON.stringify(habits)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "habit-ledger-backup.json";
  a.click();
}

function importData(e){
  const reader = new FileReader();
  reader.onload = () => { habits = JSON.parse(reader.result); save(); };
  reader.readAsText(e.target.files[0]);
}

function clearData(){
  if(confirm("Are you sure you want to delete all data?")){
    localStorage.removeItem("habits");
    habits = [];
    render();
  }
}

function getRangeDates(){
  const selected = new Date(dateInput.value);
  const range = document.getElementById("range").value;
  let dates = [];
  function pushRange(start, end){
    let d = new Date(end);
    while(d >= start){
      dates.push(new Date(d).toDateString());
      d.setDate(d.getDate()-1);
    }
  }
  if(range==="7"){
    for(let i=0;i<7;i++){ let d=new Date(selected); d.setDate(d.getDate()-i); dates.push(d.toDateString()); }
  }
  else if(range==="thisMonth"){
    pushRange(new Date(selected.getFullYear(), selected.getMonth(), 1), selected);
  }
  else if(range==="lastMonth"){
    pushRange(new Date(selected.getFullYear(), selected.getMonth()-1, 1), new Date(selected.getFullYear(), selected.getMonth(), 0));
  }
  else if(range==="3" || range==="6"){
    let start=new Date(selected); start.setMonth(start.getMonth()-parseInt(range));
    pushRange(start, selected);
  }
  else if(range==="thisYear"){
    pushRange(new Date(selected.getFullYear(),0,1), selected);
  }
  else if(range==="lastYear"){
    pushRange(new Date(selected.getFullYear()-1,0,1), new Date(selected.getFullYear()-1,11,31));
  }
  return dates;
}

function streak(h){
  let s=0;
  const sorted=[...h.history].sort((a,b)=>new Date(b.date)-new Date(a.date));
  for(let e of sorted){
    if(h.type==="good" && e.done) s++;
    else if(h.type==="bad" && !e.done) s++;
    else break;
  }
  return s;
}

function total(h){
  return h.type==="good"
    ? h.history.filter(x=>x.done).length
    : h.history.filter(x=>!x.done).length;
}

function status(h,d){
  const e=h.history.find(x=>x.date===d);
  if(!e) return "⬜";
  return h.type==="good"
    ? (e.done?"🟢":"🔴")
    : (e.done?"🔴":"🟢");
}

function render(){
  const dates = getRangeDates();
  const list=document.getElementById("list");
  list.innerHTML="";
  habits.forEach((h,i)=>{
    const div=document.createElement("div");
    div.className="card";
    let historyRow = dates.map(d=>`<span>${status(h,d)}</span>`).join("");
    div.innerHTML=`
      <b>${h.name}</b><br>
      🔥 Streak: ${streak(h)} | 📊 ${total(h)} days
      <div class="history">${historyRow}</div>
      <button class="done" onclick="mark(${i},true)">Done</button>
      <button class="fail" onclick="mark(${i},false)">Not Done</button>
    `;
    list.appendChild(div);
  });
}
render();
</script>
</body>
</html>
